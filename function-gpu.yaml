metadata:
  name: coronary-yolov8-seg
  namespace: cvat
  annotations:
    name: Coronary YOLOv8 Segmentation
    type: detector
    framework: pytorch
    spec: |
      [
        {"id": 0, "name": "Right coronary artery"},
        {"id": 1, "name": "Left coronary artery"}
      ]
spec:
  description: YOLOv8-seg для коронарных артерий (Shape/polygons)
  runtime: 'python:3.12'
  handler: main:handler
  eventTimeout: 60s
  build:
    image: cvat/custom-coronary-yolov8-seg
    baseImage: python:3.12-slim
    commands:
      - apt-get update && apt-get install -y libgl1 libglib2.0-0 libsm6 libxext6 libxrender1 ffmpeg && rm -rf /var/lib/apt/lists/*
      - python -m pip install --no-cache-dir --upgrade pip
      - python -m pip install --no-cache-dir ultralytics==8.3.0 opencv-python-headless numpy pillow
    dependencies:
      - ultralytics==8.3.0
      - opencv-python-headless
      - numpy
      - pillow